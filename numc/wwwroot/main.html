<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
    </head>
    <body>
        <h1>Cadastro de Usuário</h1>
        <form action="/cadastro" method="post">
            <label for="name">Nome: <input type="text" id="name" name="nome_usuario"></label>
            <label for="telefone">Telefone: <input type="number" id="telefone" name="telefone_usuario"></label>
            <label for="idade">Idade: <input type="number" id="idade" name="idade_usuario"></label>
            <button type="submit">Enviar</button>
        </form>
    </body>
</html>
